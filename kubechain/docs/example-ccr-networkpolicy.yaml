#
# Se o changelog diz "ajuste de labels" mas o manifest
# adiciona um ClusterRoleBinding com verbs wildcard:
#
# status:
#   phase: Rejected
#   aiScore: 0.94
#   aiReasoning: "CRÍTICO: O changelog descreve 'ajuste de labels' mas o
#     manifest propõe criação de ClusterRoleBinding com verbs: ['*'].
#     Essa é uma escalada de privilégios severa completamente inconsistente
#     com a descrição fornecida. Possível attempt de privilege escalation
#     usando descrição enganosa."
#   rejectionReason: "AI risk score 0.94 excede threshold 0.85: CRÍTICO:
#     O changelog descreve 'ajuste de labels' mas o manifest..."
